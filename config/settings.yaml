# MIDI-OSC Gateway — Configuration
# Run install.ps1 to auto-configure, or edit manually following the comments.

server:
  host: "0.0.0.0"       # listen on all network interfaces
  port: 9000             # UDP port — must match the OSC app on your phone
  recv_buffer_bytes: 4194304  # 4 MB kernel receive buffer

midi:
  # Substring of the MIDI output port name to use.
  # Leave empty to auto-select: prefers loopMIDI or any non-GS port,
  # falls back to Microsoft GS Wavetable Synth (built into Windows).
  # Run install.ps1 to detect and fill this automatically.
  device_name: ""

security:
  # --- How to choose ---
  #
  # require_hmac: false  <- USE THIS for TouchOSC, OSC Controller, or any
  #                         standard OSC app on your phone. The IP allowlist
  #                         below is still enforced — only your listed devices
  #                         can send messages. Sufficient for home/studio use.
  #
  # require_hmac: true   <- USE THIS only if your OSC client is custom code
  #                         that implements HMAC signing (e.g. osc_client_sim.py).
  #                         Standard OSC apps do NOT support this — they will
  #                         be rejected even with the correct IP.
  #
  require_hmac: false

  # HMAC-SHA256 secret — only active when require_hmac is true.
  # Generate: python -c "import secrets; print(secrets.token_hex(32))"
  hmac_secret: "CHANGE_ME_run_install.ps1_to_generate"

  # Reject packets older than this (milliseconds). Prevents replay attacks.
  replay_window_ms: 5000

  # Allowlist: only these IPs can send messages to the gateway.
  # Add your phone's IP here — this is your primary security boundary.
  # Find your phone IP: Android -> Settings -> Wi-Fi -> tap network -> IP address
  #                     iPhone  -> Settings -> Wi-Fi -> tap (i) next to network
  # Use ["0.0.0.0"] to allow any IP (not recommended outside of testing).
  allowed_ips:
    - "127.0.0.1"
    # - "192.168.1.100"   # your phone's IP — uncomment and replace

logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  file: "logs/gateway.log"
  max_bytes: 10485760    # rotate at 10 MB
  backup_count: 5
